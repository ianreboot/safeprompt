[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "safeprompt"
version = "1.0.0"
description = "Prompt injection protection for AI applications"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    {name = "SafePrompt", email = "support@safeprompt.dev"}
]
keywords = ["ai", "security", "prompt-injection", "llm", "safeguard"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://safeprompt.dev"
Documentation = "https://docs.safeprompt.dev"
Repository = "https://github.com/ianreboot/safeprompt"
"Bug Tracker" = "https://github.com/ianreboot/safeprompt/issues"

[tool.hatch.build.targets.wheel]
packages = ["safeprompt"]

[tool.pytest.ini_options]
testpaths = ["tests"]
